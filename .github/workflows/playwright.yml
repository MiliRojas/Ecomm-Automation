name: Playwright CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload user data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-data
          path: temp-user.json

      - name: Upload UI Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: playwright-report/

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: ui-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Download user data
        uses: actions/download-artifact@v4
        with:
          name: user-data

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        run: npm run test:api

      - name: Upload API Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: playwright-report/
